name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-compatibility:
    name: Source / ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      HF_HUB_DISABLE_XET: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python 3.11, minimum dependency boundary
            python-version: "3.11"
            torch: "torch==2.5.*"
            transformers: "transformers==4.40.2"
          - name: Python 3.11, Transformers 5
            python-version: "3.11"
            torch: "torch"
            transformers: "transformers>=5,<6"
          - name: Python 3.12, Transformers 5
            python-version: "3.12"
            torch: "torch"
            transformers: "transformers>=5,<6"
          - name: Python 3.13, Transformers 5
            python-version: "3.13"
            torch: "torch"
            transformers: "transformers>=5,<6"

    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the selected dependency boundary
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            "${{ matrix.torch }}"
          python -m pip install "${{ matrix.transformers }}"
          python -m pip install -e ".[dev]"

      - name: Run tests and import checks
        run: |
          export EXPECTED_VERSION="$(
            python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          )"
          python -m black --check pear tests
          python -m pytest -m "not network"
          python -m pytest \
            -m "network and not checkpoint_integration" \
            --run-network \
            --tokenizer-baseline=tests/fixtures/tokenizers-4.40.2.json
          python -m compileall -q pear tests
          python -m pip check
          python - <<'PY'
          import os
          from importlib.metadata import distribution

          import pear
          from packaging.specifiers import SpecifierSet

          installed = distribution("pear-mt")
          assert pear.__version__ == installed.version == os.environ["EXPECTED_VERSION"]
          assert SpecifierSet(installed.metadata["Requires-Python"]) == SpecifierSet(
              ">=3.11,<3.14"
          )
          PY
          test "$(pear --version)" = "pear $EXPECTED_VERSION"
          test "$(pear-mt --version)" = "pear-mt $EXPECTED_VERSION"
          pear --help
          pear-mt --help

  build-distributions:
    name: Build wheel and source distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Read project version
        id: metadata
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          version = project["version"]
          if project["requires-python"] != ">=3.11,<3.14":
              raise SystemExit(
                  "Unexpected authored requires-python: "
                  f"{project['requires-python']!r}"
              )
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
              output.write(f"version={version}\n")
          PY

      - name: Build and inspect distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check --strict dist/*
          python - <<'PY'
          import tarfile
          import zipfile
          from email.parser import BytesParser
          from pathlib import Path

          from packaging.specifiers import SpecifierSet

          files = [path for path in Path("dist").iterdir() if path.is_file()]
          wheels = [path for path in files if path.suffix == ".whl"]
          sdists = [path for path in files if path.name.endswith(".tar.gz")]
          if len(files) != 2 or len(wheels) != 1 or len(sdists) != 1:
              raise SystemExit(
                  f"Expected exactly one wheel and one sdist; found: {files}"
              )
          if not wheels[0].name.endswith("-py3-none-any.whl"):
              raise SystemExit(f"Expected a universal wheel; found: {wheels[0]}")

          for path in files:
              if path.suffix == ".whl":
                  with zipfile.ZipFile(path) as archive:
                      member = next(
                          name
                          for name in archive.namelist()
                          if name.endswith(".dist-info/METADATA")
                      )
                      metadata_bytes = archive.read(member)
              else:
                  with tarfile.open(path, "r:gz") as archive:
                      member = next(
                          item
                          for item in archive.getmembers()
                          if item.name.endswith("/PKG-INFO")
                      )
                      extracted = archive.extractfile(member)
                      if extracted is None:
                          raise SystemExit(f"Could not read metadata from {path}")
                      metadata_bytes = extracted.read()

              metadata = BytesParser().parsebytes(metadata_bytes)
              if SpecifierSet(metadata["Requires-Python"]) != SpecifierSet(
                  ">=3.11,<3.14"
              ):
                  raise SystemExit(
                      f"Unexpected Requires-Python in {path}: "
                      f"{metadata['Requires-Python']!r}"
                  )
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  test-artifacts:
    name: Install ${{ matrix.artifact }} / Python ${{ matrix.python-version }}
    needs: build-distributions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
        artifact:
          - wheel
          - sdist
        include:
          - artifact: wheel
            pattern: "*.whl"
          - artifact: sdist
            pattern: "*.tar.gz"

    steps:
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Install the selected artifact
        env:
          ARTIFACT_PATTERN: ${{ matrix.pattern }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://download.pytorch.org/whl/cpu \
            torch
          artifact="$(find dist -maxdepth 1 -type f -name "$ARTIFACT_PATTERN" -print -quit)"
          test -n "$artifact"
          python -m pip install --no-cache-dir "$artifact"

      - name: Verify the installed distribution
        env:
          EXPECTED_VERSION: ${{ needs.build-distributions.outputs.version }}
        run: |
          python - <<'PY'
          import os
          from importlib.metadata import distribution

          import pear
          from packaging.specifiers import SpecifierSet

          installed = distribution("pear-mt")
          assert installed.metadata["Name"] == "pear-mt"
          assert SpecifierSet(installed.metadata["Requires-Python"]) == SpecifierSet(
              ">=3.11,<3.14"
          )
          assert pear.__version__ == installed.version == os.environ["EXPECTED_VERSION"]
          PY
          python -m pip check
          test "$(pear --version)" = "pear $EXPECTED_VERSION"
          test "$(pear-mt --version)" = "pear-mt $EXPECTED_VERSION"
          pear --help
          pear-mt --help
